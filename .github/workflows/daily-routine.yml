name: 毎朝ルーティン（6エージェント連携）

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      account:
        description: '対象アカウント'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - ponta
          - luna

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  THREADS_PONTA_TOKEN: ${{ secrets.THREADS_PONTA_TOKEN }}
  THREADS_LUNA_TOKEN: ${{ secrets.THREADS_LUNA_TOKEN }}

jobs:
  ponta-routine:
    if: github.event_name == 'schedule' || github.event.inputs.account == 'both' || github.event.inputs.account == 'ponta'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests anthropic
      - name: "6エージェント連携実行（ポンタ）"
        run: python3 scripts/daily_routine.py ponta

  luna-routine:
    if: github.event_name == 'schedule' || github.event.inputs.account == 'both' || github.event.inputs.account == 'luna'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests anthropic
      - name: "6エージェント連携実行（ルナ）"
        run: python3 scripts/daily_routine.py luna
