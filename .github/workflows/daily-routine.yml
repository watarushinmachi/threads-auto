name: 毎朝ルーティン（6エージェント連携）

on:
  schedule:
    # 毎日 22:00 UTC = 朝 7:00 JST
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      account:
        description: '対象アカウント'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - ponta
          - luna

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  THREADS_PONTA_TOKEN: ${{ secrets.THREADS_PONTA_TOKEN }}
  THREADS_LUNA_TOKEN: ${{ secrets.THREADS_LUNA_TOKEN }}

jobs:
  ponta-routine:
    if: github.event_name == 'schedule' || github.event.inputs.account == 'both' || github.event.inputs.account == 'ponta'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: "Agent 1: FETCHER（データ取得）"
        id: fetcher
        run: |
          echo "=== FETCHER: 前日の投稿データ取得 ==="
          python3 threads_api.py ponta --analyze --days 1 > /tmp/fetcher_result.txt 2>&1 || true
          cat /tmp/fetcher_result.txt
          echo "fetcher_done=true" >> $GITHUB_OUTPUT

      - name: "Agent 2: ANALYST（分析）"
        id: analyst
        run: |
          echo "=== ANALYST: 前日の投稿分析 ==="
          python3 -c "
          import json, os, anthropic

          # ナレッジ読み込み
          with open('共通/ナレッジ/05_writing.md', 'r') as f:
              writing_knowledge = f.read()
          with open('共通/ナレッジ/algorithm.md', 'r') as f:
              algorithm_knowledge = f.read()

          # FETCHER結果読み込み
          fetcher_result = ''
          if os.path.exists('/tmp/fetcher_result.txt'):
              with open('/tmp/fetcher_result.txt', 'r') as f:
                  fetcher_result = f.read()

          client = anthropic.Anthropic()
          response = client.messages.create(
              model='claude-sonnet-4-20250514',
              max_tokens=2000,
              messages=[{'role': 'user', 'content': f'''あなたはThreads投稿のアナリストです。
          以下のデータを分析してください。

          【前日の投稿データ】
          {fetcher_result[:3000]}

          【分析基準（6つのバズテクニック）】
          {writing_knowledge[:2000]}

          以下を簡潔にまとめてください：
          1. 各投稿のS/A/B/C/Dランク評価
          2. 伸びた投稿の要因
          3. 伸びなかった投稿の改善点
          4. 今日の投稿で意識すべきこと3点

          日本語で箇条書きで簡潔に。'}]
          )
          analysis = response.content[0].text
          print(analysis)
          with open('/tmp/analyst_result.txt', 'w') as f:
              f.write(analysis)
          "

      - name: "Agent 3: RESEARCHER（競合リサーチ）"
        id: researcher
        run: |
          echo "=== RESEARCHER: 競合バズ投稿リサーチ ==="
          python3 -c "
          from threads_api import *
          import json, time

          get_user_profile('ponta')
          all_results = []
          for kw in ['AI 活用', '借金返済', 'Claude Code']:
              try:
                  results = search_threads('ponta', kw, limit=5)
                  all_results.extend(results)
              except Exception as e:
                  print(f'検索エラー ({kw}): {e}')
              time.sleep(1)

          # TOP3抽出
          all_results.sort(key=lambda p: p.get('views', 0), reverse=True)
          top3 = all_results[:3]
          print(f'\nバズ投稿TOP3:')
          for i, p in enumerate(top3):
              print(f'{i+1}. {p.get(\"views\", \"?\")}表示 | @{p.get(\"username\", \"?\")}')
              print(f'   {p.get(\"text\", \"\")[:100]}')

          with open('/tmp/researcher_result.json', 'w') as f:
              json.dump(top3, f, ensure_ascii=False)
          " || echo "リサーチスキップ（API制限の可能性）"

      - name: "Agent 4: WRITER（投稿5本生成）"
        id: writer
        run: |
          echo "=== WRITER: ナレッジベース参照→投稿5本生成 ==="
          python3 -c "
          import json, os, anthropic

          # 全ナレッジ読み込み
          knowledge = {}
          knowledge_files = [
              '共通/ナレッジ/05_writing.md',
              '共通/ナレッジ/07_ng-rules.md',
              '共通/ナレッジ/buzzwords.md',
              'ポンタ/ナレッジ/01_profile.md',
              'ポンタ/ナレッジ/02_target.md',
              'ポンタ/ナレッジ/03_genre.md',
              'ポンタ/ナレッジ/05_writing.md',
              'ポンタ/ナレッジ/04_domain/AI活用術.md',
              'ポンタ/ナレッジ/04_domain/借金返済ドキュメンタリー.md',
          ]
          for fp in knowledge_files:
              try:
                  with open(fp, 'r') as f:
                      knowledge[fp] = f.read()
              except:
                  pass

          # 分析結果とリサーチ結果
          analyst = ''
          if os.path.exists('/tmp/analyst_result.txt'):
              with open('/tmp/analyst_result.txt', 'r') as f:
                  analyst = f.read()
          researcher = '[]'
          if os.path.exists('/tmp/researcher_result.json'):
              with open('/tmp/researcher_result.json', 'r') as f:
                  researcher = f.read()

          all_knowledge = '\n\n---\n\n'.join([f'## {k}\n{v}' for k, v in knowledge.items()])

          client = anthropic.Anthropic()
          response = client.messages.create(
              model='claude-sonnet-4-20250514',
              max_tokens=4000,
              messages=[{'role': 'user', 'content': f'''あなたはThreadsアカウント「ポンタ」(@ponta_ai_life)の投稿ライターです。

          【キャラクター】借金120万のFランインキャがAIで人生逆転する男。口調はカジュアルで熱量がある。「〜なんよ」「マジで」。絵文字は最小限（0〜2個）。

          【ナレッジベース】
          {all_knowledge[:8000]}

          【前日の分析結果】
          {analyst[:1500]}

          【競合バズ投稿TOP3】
          {researcher[:1500]}

          以下のルールで投稿を5本生成してください：

          配分: AI活用術×Claude Code 3本 + 借金返済リアル 1本 + 自己開示/信念 1本

          絶対ルール:
          - 500文字以内
          - フック→本編→CTAの3部構成
          - 具体性を最大化（数字、固有名詞、手順）
          - 一文の濃度を凝縮
          - NGワード禁止:「稼げる」「副業」「#副業」「X」「Twitter」、本文にリンク禁止
          - CTAにはベネフィットを必ず含める
          - 各投稿に異なるバズテクニックを使う
          - バズワード50選から冒頭フックを選んで使う

          出力形式（JSON配列）:
          [{{"content": "投稿本文", "technique": "使ったテクニック名"}}]

          JSON配列のみ出力。説明不要。'}]
          )
          result = response.content[0].text

          # JSON抽出
          import re
          match = re.search(r'\[[\s\S]*\]', result)
          if match:
              posts = json.loads(match.group())
          else:
              posts = [{'content': result, 'technique': '不明'}]

          with open('/tmp/posts.json', 'w') as f:
              json.dump(posts, f, ensure_ascii=False, indent=2)

          for i, p in enumerate(posts):
              print(f'\n--- 投稿 {i+1} 【{p.get(\"technique\", \"\")}】---')
              print(p.get('content', ''))
              print(f'文字数: {len(p.get(\"content\", \"\"))}')
          "

      - name: "Agent 5: POSTER（Discord送信）"
        id: poster
        run: |
          echo "=== POSTER: Discord送信 ==="
          python3 -c "
          import json, os
          from discord_notify import send_analysis_report, send_post_preview

          # 分析サマリー作成
          analyst = ''
          if os.path.exists('/tmp/analyst_result.txt'):
              with open('/tmp/analyst_result.txt', 'r') as f:
                  analyst = f.read()

          researcher = []
          if os.path.exists('/tmp/researcher_result.json'):
              with open('/tmp/researcher_result.json', 'r') as f:
                  researcher = json.load(f)

          summary = {
              'post_count': 0, 'total_views': 0, 'avg_views': 0,
              'total_likes': 0, 'total_replies': 0, 'total_reposts': 0,
              'best_post': {'text': 'データ取得中', 'views': 0, 'likes': 0},
              'worst_post': {'text': 'データ取得中', 'views': 0, 'likes': 0},
          }

          send_analysis_report('ponta', summary, analyst, researcher)

          # 投稿プレビュー送信
          posts = []
          if os.path.exists('/tmp/posts.json'):
              with open('/tmp/posts.json', 'r') as f:
                  posts = json.load(f)

          send_post_preview('ponta', posts)
          print(f'Discord送信完了: 分析レポート + 投稿{len(posts)}本')
          "

      - name: "Agent 6: SUPERVISOR（最終チェック）"
        run: |
          echo "=== SUPERVISOR: 最終チェック ==="
          python3 -c "
          import json, os
          from discord_notify import send_to_discord

          ng_words = ['稼げる', '副業', '#副業', 'Twitter']
          posts = []
          if os.path.exists('/tmp/posts.json'):
              with open('/tmp/posts.json', 'r') as f:
                  posts = json.load(f)

          issues = []
          for i, p in enumerate(posts):
              text = p.get('content', '')
              if len(text) > 500:
                  issues.append(f'投稿{i+1}: {len(text)}文字（500文字超過）')
              for ng in ng_words:
                  if ng in text:
                      issues.append(f'投稿{i+1}: NGワード「{ng}」を検知')

          if issues:
              msg = '⚠️ [SUPERVISOR] 問題を検知:\n' + '\n'.join(issues)
              send_to_discord('ponta_analysis', msg)
              print(msg)
          else:
              msg = f'✅ [SUPERVISOR] 全エージェント正常完了。投稿{len(posts)}本がDiscordで承認待ちです。'
              send_to_discord('ponta_analysis', msg)
              print(msg)
          "

  luna-routine:
    if: github.event_name == 'schedule' || github.event.inputs.account == 'both' || github.event.inputs.account == 'luna'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: "Agent 1: FETCHER（データ取得）"
        run: |
          echo "=== FETCHER: 前日の投稿データ取得 ==="
          python3 threads_api.py luna --analyze --days 1 > /tmp/fetcher_result.txt 2>&1 || true
          cat /tmp/fetcher_result.txt

      - name: "Agent 2: ANALYST（分析）"
        run: |
          echo "=== ANALYST: 前日の投稿分析 ==="
          python3 -c "
          import json, os, anthropic

          with open('共通/ナレッジ/05_writing.md', 'r') as f:
              writing_knowledge = f.read()

          fetcher_result = ''
          if os.path.exists('/tmp/fetcher_result.txt'):
              with open('/tmp/fetcher_result.txt', 'r') as f:
                  fetcher_result = f.read()

          client = anthropic.Anthropic()
          response = client.messages.create(
              model='claude-sonnet-4-20250514',
              max_tokens=2000,
              messages=[{'role': 'user', 'content': f'''あなたはThreads投稿のアナリストです。

          【前日の投稿データ】
          {fetcher_result[:3000]}

          【分析基準】
          {writing_knowledge[:2000]}

          以下を簡潔にまとめてください：
          1. 各投稿のS/A/B/C/Dランク評価
          2. 伸びた投稿の要因
          3. 改善点
          4. 今日の投稿で意識すべきこと3点

          日本語で箇条書きで簡潔に。'}]
          )
          analysis = response.content[0].text
          print(analysis)
          with open('/tmp/analyst_result.txt', 'w') as f:
              f.write(analysis)
          "

      - name: "Agent 3: RESEARCHER（競合リサーチ）"
        run: |
          echo "=== RESEARCHER: 競合バズ投稿リサーチ ==="
          python3 -c "
          from threads_api import *
          import json, time

          get_user_profile('luna')
          all_results = []
          for kw in ['星座占い', '恋愛運', 'タロット 恋愛']:
              try:
                  results = search_threads('luna', kw, limit=5)
                  all_results.extend(results)
              except Exception as e:
                  print(f'検索エラー ({kw}): {e}')
              time.sleep(1)

          all_results.sort(key=lambda p: p.get('views', 0), reverse=True)
          top3 = all_results[:3]
          with open('/tmp/researcher_result.json', 'w') as f:
              json.dump(top3, f, ensure_ascii=False)
          " || echo "リサーチスキップ"

      - name: "Agent 4: WRITER（投稿5本生成）"
        run: |
          echo "=== WRITER: ナレッジベース参照→投稿5本生成 ==="
          python3 -c "
          import json, os, anthropic, re

          knowledge = {}
          for fp in [
              '共通/ナレッジ/05_writing.md', '共通/ナレッジ/07_ng-rules.md', '共通/ナレッジ/buzzwords.md',
              'ルナ/ナレッジ/01_profile.md', 'ルナ/ナレッジ/02_target.md', 'ルナ/ナレッジ/03_genre.md',
              'ルナ/ナレッジ/05_writing.md', 'ルナ/ナレッジ/04_domain/星座占い.md', 'ルナ/ナレッジ/04_domain/恋愛心理学.md',
          ]:
              try:
                  with open(fp, 'r') as f:
                      knowledge[fp] = f.read()
              except:
                  pass

          analyst = ''
          if os.path.exists('/tmp/analyst_result.txt'):
              with open('/tmp/analyst_result.txt', 'r') as f:
                  analyst = f.read()
          researcher = '[]'
          if os.path.exists('/tmp/researcher_result.json'):
              with open('/tmp/researcher_result.json', 'r') as f:
                  researcher = f.read()

          all_knowledge = '\n\n---\n\n'.join([f'## {k}\n{v}' for k, v in knowledge.items()])

          client = anthropic.Anthropic()
          response = client.messages.create(
              model='claude-sonnet-4-20250514',
              max_tokens=4000,
              messages=[{'role': 'user', 'content': f'''あなたはThreadsアカウント「ルナ」(@runa29677)の投稿ライターです。

          【キャラクター】恋愛×星座占い。口調は優しく柔らかい。「〜だよ」「〜かも」。絵文字は🌙⭐💫✨💕を1〜3個。

          【ナレッジベース】
          {all_knowledge[:8000]}

          【前日の分析結果】
          {analyst[:1500]}

          【競合バズ投稿TOP3】
          {researcher[:1500]}

          以下のルールで投稿を5本生成してください：

          絶対ルール:
          - 500文字以内
          - フック→本編→CTAの3部構成
          - 具体的なアクション入り（「午後3時に彼にLINE送って」等）
          - NGワード禁止:「稼げる」「副業」「#副業」「X」「Twitter」、本文リンク禁止
          - CTAにベネフィット含める
          - 各投稿に異なるバズテクニックを使う
          - 必ずポジティブで締める

          出力形式（JSON配列）:
          [{{"content": "投稿本文", "technique": "テクニック名"}}]

          JSON配列のみ出力。'}]
          )
          result = response.content[0].text
          match = re.search(r'\[[\s\S]*\]', result)
          posts = json.loads(match.group()) if match else [{'content': result, 'technique': '不明'}]

          with open('/tmp/posts.json', 'w') as f:
              json.dump(posts, f, ensure_ascii=False, indent=2)

          for i, p in enumerate(posts):
              print(f'\n--- 投稿 {i+1} 【{p.get(\"technique\", \"\")}】---')
              print(p.get('content', ''))
              print(f'文字数: {len(p.get(\"content\", \"\"))}')
          "

      - name: "Agent 5: POSTER（Discord送信）"
        run: |
          echo "=== POSTER: Discord送信 ==="
          python3 -c "
          import json, os
          from discord_notify import send_analysis_report, send_post_preview

          analyst = ''
          if os.path.exists('/tmp/analyst_result.txt'):
              with open('/tmp/analyst_result.txt', 'r') as f:
                  analyst = f.read()

          researcher = []
          if os.path.exists('/tmp/researcher_result.json'):
              with open('/tmp/researcher_result.json', 'r') as f:
                  researcher = json.load(f)

          summary = {
              'post_count': 0, 'total_views': 0, 'avg_views': 0,
              'total_likes': 0, 'total_replies': 0, 'total_reposts': 0,
              'best_post': {'text': 'データ取得中', 'views': 0, 'likes': 0},
              'worst_post': {'text': 'データ取得中', 'views': 0, 'likes': 0},
          }

          send_analysis_report('luna', summary, analyst, researcher)

          posts = []
          if os.path.exists('/tmp/posts.json'):
              with open('/tmp/posts.json', 'r') as f:
                  posts = json.load(f)
          send_post_preview('luna', posts)
          print(f'Discord送信完了: 分析レポート + 投稿{len(posts)}本')
          "

      - name: "Agent 6: SUPERVISOR（最終チェック）"
        run: |
          echo "=== SUPERVISOR: 最終チェック ==="
          python3 -c "
          import json, os
          from discord_notify import send_to_discord

          ng_words = ['稼げる', '副業', '#副業', 'Twitter']
          posts = []
          if os.path.exists('/tmp/posts.json'):
              with open('/tmp/posts.json', 'r') as f:
                  posts = json.load(f)

          issues = []
          for i, p in enumerate(posts):
              text = p.get('content', '')
              if len(text) > 500:
                  issues.append(f'投稿{i+1}: {len(text)}文字（500文字超過）')
              for ng in ng_words:
                  if ng in text:
                      issues.append(f'投稿{i+1}: NGワード「{ng}」を検知')

          if issues:
              msg = '⚠️ [SUPERVISOR] 問題を検知:\n' + '\n'.join(issues)
              send_to_discord('luna_analysis', msg)
              print(msg)
          else:
              msg = f'✅ [SUPERVISOR] 全エージェント正常完了。投稿{len(posts)}本がDiscordで承認待ちです。'
              send_to_discord('luna_analysis', msg)
              print(msg)
          "
